telegram_triage_rules:
  primary_signal:
    - original footage
    - original document
    - stable public archive
    - direct project publication
  verify_before_publication:
    - reposts
    - accusations against named persons
    - casualty identity claims
    - POW/MIA/KIA claims
    - collaborator claims
    - screenshots without source link
  do_not_auto_publish:
    - private phone numbers
    - home addresses
    - family data
    - personal documents
    - revenge calls
    - live targeting
    - credential leaks
