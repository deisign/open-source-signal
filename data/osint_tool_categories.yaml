- id: archiving
  title_en: Archiving
  title_uk: Архівування
  description_en: Capture and compare public web pages so claims can be preserved and reviewed later.
  description_uk: Збереження та порівняння публічних вебсторінок для подальшої перевірки тверджень.
  order: 10
- id: geolocation
  title_en: Geolocation
  title_uk: Геолокація
  description_en: Map, satellite, street-level, and environmental tools for locating and contextualizing public media.
  description_uk: Мапи, супутникові знімки, панорами та природні підказки для локалізації публічних матеріалів.
  order: 20
- id: transport_infrastructure_geoint
  title_en: Transport & Infrastructure GEOINT
  title_uk: Транспортна та інфраструктурна GEOINT
  description_en: Tools for contextual verification of transport networks, vessels, aircraft, fire signals, and infrastructure layers.
  description_uk: Інструменти для контекстної перевірки транспортних мереж, суден, повітряних даних, пожежних сигналів та інфраструктурних шарів.
  order: 25
- id: image_video_verification
  title_en: Image and Video Verification
  title_uk: Верифікація фото й відео
  description_en: Reverse search, metadata, and forensic helpers for checking visual evidence and media provenance.
  description_uk: Зворотний пошук, метадані та форензика для перевірки візуальних доказів і походження медіа.
  order: 30
- id: domains_infrastructure
  title_en: Domains and Infrastructure
  title_uk: Домени й інфраструктура
  description_en: Public lookups that explain domain ownership signals, certificates, DNS, and visible web technology.
  description_uk: Публічні довідники для доменів, сертифікатів, DNS та видимих вебтехнологій.
  order: 40
- id: news_media_monitoring
  title_en: News and Media Monitoring
  title_uk: Моніторинг новин і медіа
  description_en: Public datasets and monitoring services for tracking narratives, events, and media coverage.
  description_uk: Публічні набори даних і сервіси для відстеження наративів, подій та медіависвітлення.
  order: 50
- id: data_analysis_monitoring
  title_en: Data Analysis & Website Monitoring
  title_uk: Аналіз даних і моніторинг сайтів
  description_en: Tools for searching text-heavy datasets, spreadsheets, documents, and monitoring public webpages for changes.
  description_uk: Інструменти для пошуку в текстових наборах даних, таблицях, документах і моніторингу змін на публічних вебсторінках.
  order: 55
- id: passive_infrastructure_context
  title_en: Passive Infrastructure Context
  title_uk: Пасивний інфраструктурний контекст
  description_en: Passive tools for understanding domains, URLs, certificates, IP addresses, ASNs, DNS records, redirects, and public web infrastructure without active scanning.
  description_uk: Пасивні інструменти для аналізу доменів, URL, сертифікатів, IP-адрес, ASN, DNS-записів, редиректів і публічної вебінфраструктури без активного сканування.
  order: 56
- id: code_repository_osint
  title_en: Code & Repository OSINT
  title_uk: OSINT коду та репозиторіїв
  description_en: Tools for investigating public code repositories, commit history, developer accounts, organizations, metadata, exposed emails, public keys, and accidentally published secrets in a defensive and journalistic context.
  description_uk: Інструменти для дослідження публічних репозиторіїв коду, історії комітів, акаунтів розробників, організацій, метаданих, відкритих email-адрес, публічних ключів і випадково опублікованих секретів у захисному та журналістському контексті.
  order: 58
- id: data_visualization
  title_en: Data Visualization
  title_uk: Візуалізація даних
  description_en: Tools for exploring, publishing, and explaining structured evidence and source networks.
  description_uk: Інструменти для дослідження, публікації та пояснення структурованих доказів і мереж джерел.
  order: 60
- id: workflow_methods
  title_en: Workflow Methods
  title_uk: Робочі методики
  description_en: Note-taking and workflow tools that help researchers keep source trails, hypotheses, and checks organized.
  description_uk: Інструменти для нотаток і процесів, які допомагають впорядковувати джерела, гіпотези й перевірки.
  order: 70
